#################################
#             Shadows           #
#################################

shadow = true;
shadow-radius = 12;
shadow-opacity = 0.7
shadow-offset-x = -5;
shadow-offset-y = -5;
# shadow-red = 0
# shadow-green = 0
# shadow-blue = 0
# shadow-color = "#000000"
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "_GTK_FRAME_EXTENTS@:c"
];
# clip-shadow-above = []
# shadow-exclude-reg = ""
# crop-shadow-to-monitor = false

#################################
#          Animation            #
#################################
# animation = true;
# animation-stiffness-in-tag = 125;
# animation-stiffness-tag-change = 90.0;
# animation-window-mass = 0.4;
# animation-damping = 15;
# animation-clamping = true;
# #open windows
# animation-for-open-window = "zoom";
# #minimize or close windows
# animation-for-unmap-window = "squeeze";
# #popup windows
# animation-for-transient-window = "slide-down"; 
# #set animation for windows being transitioned out while changing tags
# animation-for-prev-tag = "slide-left";
# #enables fading for windows being transitioned out while changing tags
# enable-fading-prev-tag = true;
# #set animation for windows being transitioned in while changing tags
# animation-for-next-tag = "slide-right";
# #enables fading for windows being transitioned in while changing tags
# enable-fading-next-tag = true;

#################################
#           Transition          #
#################################
transition = true;
transition-offset = 40;
transition-direction = "smart-y";
transition-timing-function = "ease-out-cubic";
transition-step = 0.050;
transition-rule = [
     # "none: window_type = 'kitty'",
     "smart-y: class_g ?= 'rofi'",
];


#################################
#           Fading              #
#################################

fading = true;
fade-in-step = 0.06;
fade-out-step = 0.06;
fade-delta = 6;
# fade-exclude = []
# no-fading-openclose = false
# no-fading-destroyed-argb = false


#################################
#   Transparency / Opacity      #
#################################

active-opacity = 1;
inactive-opacity = 1;
frame-opacity = 1;
inactive-opacity-override = false;
detect-client-opacity = true;
focus-exclude = [ "class_g = 'Cairo-clock'" ];
opacity-rule = [
  "80:class_g = 'kitty' && focused",
  "70:class_g = 'kitty' && !focused",
  "70:class_g = 'Alacritty' && focused",
  "50:class_g = 'Alacritty' && !focused",
]


#################################
#           Corners             #
#################################
corner-radius = 0
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
];


#################################
#     Background-Blurring       #
#################################
#
blur-background = true;
blur-kern = "3x3box";
blur-method = "dual_kawase"
blur-strength = 6;
# Exclude conditions for background blur.
# blur-background-exclude = []
blur-background-exclude = [
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];

#################################
#       General Settings        #
#################################

backend = "glx";
vsync = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
refresh-rate = 0;
use-ewmh-active-win = true;
detect-transient = true;
detect-client-leader = true;
use-damage = true;
log-level = "warn";
wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.75; focus = true; full-shadow = false; };
  dock = { shadow = true; opacity = 0.7; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 1;}
  dropdown_menu = { opacity = 1; }
};
