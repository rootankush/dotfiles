[mocha]
background = #1E1E2E
background-alt = #11111b
foreground = #cdd6f4
primary = #cdd6f4
secondary = #a6adc8
alert = #f38ba8
disabled = #45475a

include-file = /home/ankush/.config/polybar/modules.ini
; include-file = /home/ankush/.config/polybar/fonts.ini

[bar/mybar]
; width = 97.3%
width = 100%
height = 28pt
radius = 1
dpi = 100
background = ${mocha.background}
foreground = ${mocha.foreground}
line-size = 4pt
fixed-center = true
border-left-size = 2
border-right-size = 2
border-top-size = 2
border-bottom-size = 2
border-color = #08D9D6
offset-x = 0
padding-left = 2
padding-right = 2
margin-top = 1
margin-bottom = 1
separagtor = |
modules-left = date
modules-center = bspwm
modules-right = pulseaudio wireless battery
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
font-0 = FiraCode Nerd Font:size=12;2
wm-restack = bspwm

[settings]
screenchange-reload = true
pseudo-transparency = true

