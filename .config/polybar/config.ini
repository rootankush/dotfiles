[mocha]
background = #1E1E2E
background-alt = #11111b
foreground = #cdd6f4
primary = #cdd6f4
secondary = #a6adc8
alert = #f38ba8
disabled = #45475a
;
include-file = /home/ankush/.config/polybar/modules.ini
; include-file = /home/ankush/.config/polybar/fonts.ini

[bar/mybar]
width = 100%
height = 30pt
radius = 0

background = ${mocha.background}
foreground = ${mocha.foreground}

line-size = 3pt

fixed-center = true
border-left-size = 10
border-right-size = 10
border-top-size = 10
border-color = #00000000

padding-left = 1
padding-right = 1
margin-top = 1
margin-bottom = 1
separator = |
separator-foreground = ${mocha.disabled}

modules-center = date
modules-left = bspwm
modules-right = pulseaudio memory cpu wlan battery
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

font-0 = monospace;2
; wm-restack = generic
wm-restack = bspwm
; wm-restack = i3
; override-redirect = true

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini

