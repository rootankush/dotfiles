[mocha]
background = #1E1E2E
; background = #2E3440
background-alt = #11111b
foreground = #cdd6f4
primary = #cdd6f4
secondary = #a6adc8
alert = #f38ba8
disabled = #45475a

include-file = /home/ankush/.config/polybar/modules.ini
; include-file = /home/ankush/.config/polybar/fonts.ini

[bar/mybar]
width = 98.5%
; width = 100%
height = 28pt
radius = 0
dpi = 100
background = ${mocha.background}
foreground = ${mocha.foreground}
line-size = 4pt
fixed-center = true
border-left-size = 1
border-right-size = 1
border-top-size = 1
border-bottom-size = 1
border-color = #FFFFFF
; border-color = #00000000
offset-x = 15
offset-y = 15
padding-left = 2
padding-right = 2
margin-top = 1
margin-bottom = 1
separagtor = |
modules-left = date
modules-center = bspwm
modules-right = pulseaudio wireless battery
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
font-0 = FiraCode Nerd Font:size=12;2
wm-restack = bspwm

[settings]
screenchange-reload = true
pseudo-transparency = true

